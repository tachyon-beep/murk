coverage:
  status:
    # Coverage is informational, not a merge gate. Writing tests to hit
    # an arbitrary coverage number produces low-value tests that slow
    # down the suite without catching real bugs.
    project:
      default:
        informational: true   # report but never block merges
        target: auto
        threshold: 2%
    patch:
      default:
        informational: true   # report but never block merges

  # Don't block PR merges on coverage upload failures.
  notify:
    after_n_builds: 1

ignore:
  # Benchmark harnesses — not production code.
  - "crates/murk-bench/**"
  # Python binding glue — tested via pytest, not tarpaulin.
  - "crates/murk-python/**"
  # Examples are documentation, not covered code.
  - "crates/*/examples/**"
  - "examples/**"
