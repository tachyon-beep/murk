coverage:
  status:
    # Project-level: overall repo coverage must not drop significantly.
    project:
      default:
        target: auto    # track against baseline, not a fixed number
        threshold: 1%   # allow up to 1% drop before failing

    # Patch-level: new/changed lines in a PR.
    # FFI crates have structurally hard-to-cover code (ffi_guard! panic
    # catch, mutex poisoning recovery, deprecated accessor error paths)
    # so a strict patch target causes false failures on hardening PRs.
    patch:
      default:
        target: 70%
        threshold: 0%

  # Don't block PR merges on coverage upload failures.
  notify:
    after_n_builds: 1

ignore:
  # Benchmark harnesses — not production code.
  - "crates/murk-bench/**"
  # Python binding glue — tested via pytest, not tarpaulin.
  - "crates/murk-python/**"
  # Examples are documentation, not covered code.
  - "crates/*/examples/**"
  - "examples/**"
